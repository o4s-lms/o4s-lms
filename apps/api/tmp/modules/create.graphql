mutation (
	$name: String!,
	$slug: String!,
	$courseId: Int!,
	$userId: String @fromClaim(name: USERID)
	) {
	createOneModule: lms_createOneModule(
		data: {
			name: $name
			slug: $slug
			courseId: $courseId
			createdBy: $userId
		}
	) {
		id
		name
		slug
		courseId
		createdBy
		createdAt
	}
}