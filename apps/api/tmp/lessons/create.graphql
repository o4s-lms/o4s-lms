mutation (
	$name: String!,
	$slug: String!,
	$courseId: Int!,
	$moduleId: Int!,
	$userId: String @fromClaim(name: USERID)
	) {
	createOneLesson: lms_createOneLesson(
		data: {
			name: $name
			slug: $slug
			courseId: $courseId
			moduleId: $moduleId
			createdBy: $userId
		}
	) {
		id
		name
		slug
		courseId
		moduleId
		createdBy
		createdAt
	}
}

mutation ($id: String!, $name: String!, $email: String!) {
  my_db_executeRaw(
    query: "insert or ignore into User (id,name,email) values ($1,$2,$3)"
    parameters: [$id, $name, $email]
  )
}