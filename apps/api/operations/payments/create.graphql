mutation (
	$status: site_PaymentStatus!,
	$value: Int!,
	$method_id: String!,
	$order_id: String!
	) {
	payment: site_createOnePayment(
		data: {
			status: $status
			value: $value
			order: { connect: { id: $order_id } }
			payment_method: { connect: { id: $method_id } }
		}
	) {
		id
		status
		value
		order {
			id
			currency
			status
			customer_uuid
			customer_email
		}
		payment_method {
			instructions
			is_manual
			type
			gateway
		}
	}
}