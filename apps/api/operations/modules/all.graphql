query ($deleted: Boolean = false) {
	modules: lms_findManyModule(
		where: { deleted: { equals: $deleted } }
		orderBy: { pos: asc }
	) {
		id
		name
		slug
		pos
		courseId
		createdBy
		createdAt
		lessons(
			where: { deleted: { equals: $deleted } }
			orderBy: { pos: asc }
		) {
			id
			name
			slug
			pos
			status
			courseId
			moduleId
			createdBy
			createdAt
			updatedAt
		}
	}
}