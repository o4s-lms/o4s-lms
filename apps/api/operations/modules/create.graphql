mutation (
	$name: String!,
	$slug: String!,
	$courseId: Int!,
	$userId: String! @fromClaim(name: USERID)
	) {
	module: lms_createOneModule(
		data: {
			name: $name
			slug: $slug
			createdBy: $userId
			course: { connect: { id: $courseId } }
		}
	) {
		id
		name
		slug
		courseId
		createdBy
		createdAt
	}
}