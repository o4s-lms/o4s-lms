mutation (
	$name: String!,
	$slug: String!,
	$course_id: String!,
	$user_id: String! @fromClaim(name: USERID)
	) {
	module: site_createOneModule(
		data: {
			name: $name
			slug: $slug
			created_by: $user_id
			course: { connect: { id: $course_id } }
		}
	) {
		id
		name
		slug
		course_id
		created_by
		created_at
	}
}