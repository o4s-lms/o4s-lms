query ($id: String!, $deleted: Boolean = false) {
	module: site_findUniqueModule(
		where: { id: $id }
	) {
		id
		name
		slug
		pos
		course_id
		created_by
		created_at
		lessons(
			where: { deleted: { equals: $deleted } }
			orderBy: { pos: asc }
		) {
			id
			name
			slug
			pos
			status
			course_id
			module_id
			created_by
			created_at
			updated_at
		}
	}
}