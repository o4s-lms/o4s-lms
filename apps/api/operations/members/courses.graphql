query (
	$role: lms_CourseRole!,
	$userId: String! @fromClaim(name: USERID)
)
@rbac(requireMatchAll: [user]) {
	courses: lms_findManyMemberInCourse(
		where: {
			userId: { equals: $userId }
			role: { equals: $role }
		}
	) {
		lastActivity
		course {
			id
			name
			description
			image
			published
			createdBy
			createdAt
		}
	}
}