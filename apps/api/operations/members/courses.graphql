query ($role: lms_CourseRole!, $user_uuid: String! @fromClaim(name: USERID)) {
	courses: lms_findManyCourseMember(
		where: {
			user_uuid: { equals: $user_uuid }
			role: { equals: $role }
		}
	) {
		last_activity
		course {
			id
			name
			description
			slug
			image
			published
			created_by
			created_at
		}
	}
}