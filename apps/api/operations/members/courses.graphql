query (
	$role: site_CourseRole!,
	$user_uuid: String! @fromClaim(name: USERID)
)
@rbac(requireMatchAll: [user]) {
	courses: site_findManyCourseMember(
		where: {
			user_uuid: { equals: $user_uuid }
			role: { equals: $role }
		}
	) {
		last_activity
		course {
			id
			name
			description
			image
			published
			created_by
			created_at
		}
	}
}