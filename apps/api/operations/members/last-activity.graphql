mutation (
	$course_id: String!,
	$date: DateTime! @injectCurrentDateTime,
	$user_uuid: String! @fromClaim(name: USERID)
)
@rbac(requireMatchAny: [user, admin]) {
	last_activity: lms_updateOneCourseMember(
		where: {
			user_uuid_course_id: {
				user_uuid: $user_uuid
				course_id: $course_id
			}
		}
		data: {
			last_activity: { set: $date }
		}
	) {
		user_uuid
		course_id
		last_activity
	}
}