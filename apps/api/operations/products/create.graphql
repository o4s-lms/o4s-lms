mutation (
	$name: String!,
	$description: String!,
	$image: String,
	$price: Int!,
	$currency: String = "eur",
	$userId: String! @fromClaim(name: USERID)
) @rbac(requireMatchAll: [admin]) {
	createOneProduct: lms_createOneProduct(
		data: {
			name: $name
			description: $description
			image: $image
			price: $price
			currency: $currency
			createdBy: $userId
		}
	) {
		id
		name
		description
		image
		price
		currency
		active
		createdBy
		createdAt
	}
}