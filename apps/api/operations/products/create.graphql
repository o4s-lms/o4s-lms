mutation (
	$thumbnail: String!,
	$price: Int!,
	$image: String!
	$title: String!
	$description: String!,
	$slug: String!,
	$include: String!,
	$html: String,
	$order: Int!,
	$locale: String!,
  $user_uuid: String! @fromClaim(name: USERID)
) @rbac(requireMatchAll: [admin]) {
	product: site_createOneProduct(
		data: {
			thumbnail: $thumbnail
			price: $price
			image: $image
			title: $title
			description: $description
			slug: $slug
			include: $include
			html: $html
			order: $order
			locale: $locale
      created_by: $user_uuid
      updated_by: $user_uuid
		}
	) {
		id
	}
}