mutation (
	$name: String!,
	$description: String!,
	$image: String,
	$price: Int,
	$currency: String
) @rbac(requireMatchAll: [admin]) {
	createOneProduct: site_createOneProduct(
		data: {
			name: $name
			description: $description
			image: $image
			price: $price
			currency: $currency
		}
	) {
		id
		name
		description
		image
		price
		currency
		active
		createdAt
	}
}