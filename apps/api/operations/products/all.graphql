query ($locale: String!, $active: Boolean = true) {
	products: site_findManyProduct(
		where: {
      locale: { equals: $locale }
      active: { equals: $active }
    }
		orderBy: { order: asc }
	) {
		id
		thumbnail
		price
    currency
		image
		title
		description
		slug
		include
		html
		order
		locale
	}
}