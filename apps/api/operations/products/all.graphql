query ($deleted: Boolean = false, $userId: String! @fromClaim(name: USERID)) {
	products: lms_findManyProduct(
		where: {
			createdBy: { equals: $userId }
			deleted: { equals: $deleted }
		}) {
		id
		name
		description
		image
		price
		priceId
  	currency
		active
		createdBy
		createdAt
		updatedAt
		_count {
			courses
			payments
		}
	}
}