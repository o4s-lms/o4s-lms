query ($id: Int!, $deleted: Boolean = false) {
	product: lms_findUniqueProduct(where: { id: $id }) {
		id
		name
		description
		image
		price
		priceId
  	currency
		active
		createdBy
		createdAt
		updatedAt
		courses (where: { deleted: { equals: $deleted } }) {
			id
			name
			description
			image
			published
			createdBy
			createdAt
			_count {
				modules
				lessons
				members
			}
		}
	}
}