query ($id: Int!, $deleted: Boolean = false) {
	products: lms_findUniqueProduct(where: { id: $id }) {
		id
		name
		description
		image
		price
		priceId
  	currency
		courses (where: { deleted: { equals: $deleted } }) {
			id
			name
			description
			image
			published
			createdBy
			createdAt
		}
	}
}