query ($id: String!) {
	post: site_findUniquePost(where: { id: $id }) {
		id
		title
		slug
		image
		html
		meta_title
		meta_description
		est_reading_time
		author_id
		published
		published_at
		created_at
		og_image
		og_title
		og_description
		post_tags {
			tag {
				id
				name
				slug
				color
			}
		}
	}
}