query ($slug: String!) {
	post: site_findUniquePost(where: { slug: $slug }) {
		id
		title
		slug
		feature_image
		html
		est_reading_time
		author_id
		published
		published_at
		created_at
    post_meta {
      meta_title
		  meta_description
      og_image
		  og_title
		  og_description
    }
		post_tags {
			tag {
				id
				name
				slug
				color
			}
		}
	}
}