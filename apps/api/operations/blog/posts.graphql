query ($language: String!, $published: Boolean = true) {
	posts: site_findManyPost(
		where: {
			language: { equals: $language }
			published: { equals: $published }
			}
		orderBy: { published_at: asc }
	) {
		id
		title
		slug
		image
		featured
		status
		language
		meta_title
		meta_description
		excerpt
		est_reading_time
		author_id
		published
		published_at
		created_at
		post_tags {
			tag {
				id
				name
				slug
				color
			}
		}
	}
}