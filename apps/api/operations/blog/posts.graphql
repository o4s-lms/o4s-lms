query ($language: String!, $published: Boolean = true) {
	posts: site_findManyPost(
		where: {
			language: { equals: $language }
			published: { equals: $published }
			}
		orderBy: { published_at: asc }
	) {
		id
		title
		slug
		feature_image
		featured
		status
		language
		excerpt
		est_reading_time
		author_id
		published
		published_at
		created_at
    post_meta {
      meta_title
		  meta_description
      og_image
		  og_title
		  og_description
    }
		post_tags {
			tag {
				id
				name
				slug
				color
			}
		}
	}
}