mutation (
	$title: String!,
	$slug: String!,
	$feature_image: String,
	$userId: String! @fromClaim(name: USERID)
) @rbac(requireMatchAny: [editor, admin]) {
	post: site_createOnePost(
		data: {
			title: $title
			slug: $slug
			feature_image: $feature_image
			author_id: $userId
			created_by: $userId
			updated_by: $userId
		}
	) {
		id
	}
}