mutation (
	$title: String!,
	$slug: String!,
	$image: String,
	$metaTitle: String,
	$metaDescription: String,
	$userId: String! @fromClaim(name: USERID)
) @rbac(requireMatchAny: [editor, admin]) {
	post: site_createOnePost(
		data: {
			title: $title
			slug: $slug
			image: $image
			metaTitle: $metaTitle
			metaDescription: $metaDescription
		}
	) {
		id
		title
		slug
		image
		status
		language
		metaTitle
		metaDescription
		authorId
		published
		createdAt
		createdBy
	}
}