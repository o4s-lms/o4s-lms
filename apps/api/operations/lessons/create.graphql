mutation (
	$name: String!,
	$slug: String!,
	$courseId: Int!,
	$moduleId: Int!,
	$userId: String! @fromClaim(name: USERID)
	) {
	createOneLesson: lms_createOneLesson(
		data: {
			name: $name
			slug: $slug
			createdBy: $userId
			course: { connect: { id: $courseId } }
			module: { connect: { id: $moduleId } }
		}
	) {
		id
		name
		slug
		courseId
		moduleId
		createdBy
		createdAt
	}
}