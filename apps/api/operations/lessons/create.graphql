mutation (
	$name: String!,
	$slug: String!,
	$courseId: Int!,
	$moduleId: Int!,
	$userId: String @fromClaim(name: USERID)
	)
@rbac(requireMatchAll: [admin]) {
	createOnemodule: lms_createOneModule(
		data: {
			name: $name
			slug: $slug
			courseId: $courseId
			moduleId: $moduleId
			createdBy: $userId
		}
	) {
		id
		name
		slug
		courseId
		moduleId
		createdBy
		createdAt
	}
}