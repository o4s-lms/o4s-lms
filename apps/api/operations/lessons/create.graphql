mutation (
	$name: String!,
	$slug: String!,
	$course_id: String!,
	$module_id: String!,
	$user_id: String! @fromClaim(name: USERID)
	) {
	lesson: site_createOneLesson(
		data: {
			name: $name
			slug: $slug
			created_by: $user_id
			course: { connect: { id: $course_id } }
			module: { connect: { id: $module_id } }
		}
	) {
		id
		name
		slug
		pos
		status
		course_id
		module_id
		created_by
		created_at
	}
}