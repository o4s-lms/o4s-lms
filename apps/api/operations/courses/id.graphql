query ($id: Int!, $deleted: Boolean = false) {
	course: lms_findUniqueCourse(where: { id: $id }) {
		id
		name
		description
		image
		published
		createdBy
		createdAt
		modules(
			where: { deleted: { equals: $deleted } }
			orderBy: { pos: asc }
			) {
			id
			name
			slug
			pos
			courseId
			createdBy
			createdAt
			lessons(
				where: { deleted: { equals: $deleted } }
				orderBy: { pos: asc }
				) {
				id
				name
				slug
				pos
				status
				courseId
				moduleId
				createdBy
				createdAt
				updatedAt
			}
		}
	}
}