mutation (
	$name: String!,
	$description: String!,
	$slug: String!,
	$image: String!,
	$role: site_CourseRole! = AUTHOR,
	$user_uuid: String! @fromClaim(name: USERID)
) {
	course: site_createOneCourse(
		data: {
			name: $name
			description: $description
			slug: $slug
			image: $image
			created_by: $user_uuid
			members: {
				create: {
					user: { connect: { uuid: $user_uuid } }
					role: $role
				}
			}
		}
	) {
		id
		name
		description
		image
		created_by
		created_at
	}
}