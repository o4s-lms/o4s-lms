query ($deleted: Boolean = false) {
	courses: lms_findManyCourse(where: { deleted: { equals: $deleted } } ) {
		id,
		name,
		description,
		image,
		module(where: { deleted: { equals: $deleted } } ) {
			id,
			name,
			lesson(where: { deleted: { equals: $deleted } } ) {
				id,
				name,
			}
		}
	}
}