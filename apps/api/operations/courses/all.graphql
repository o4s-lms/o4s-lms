query ($deleted: Boolean = false) {
	courses: lms_findManyCourse(where: { deleted: { equals: $deleted } } ) {
		id,
		name,
		description,
		image,
		modules(where: { deleted: { equals: $deleted } } ) {
			id,
			name,
			lessons(where: { deleted: { equals: $deleted } } ) {
				id,
				name,
			}
		}
	}
}