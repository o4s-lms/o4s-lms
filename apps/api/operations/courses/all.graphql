query ($deleted: Boolean = false) {
	courses: lms_findManyCourse(where: { deleted: { equals: $deleted } } ) {
		id
		name
		description
		image
		published
		created_by
		created_at
		modules(
			where: { deleted: { equals: $deleted } }
			orderBy: { pos: asc }
			) {
			id
			name
			slug
			pos
			course_id
			created_by
			created_at
			lessons(
				where: { deleted: { equals: $deleted } }
				orderBy: { pos: asc }
				) {
				id
				name
				slug
				pos
				status
				course_id
				module_id
				created_by
				created_at
				updated_at
			}
		}
	}
}