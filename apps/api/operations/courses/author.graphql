query ($deleted: Boolean = false, $user_uuid: String! @fromClaim(name: USERID)) {
	courses: site_findManyCourse(
		where: {
			created_by: { equals: $user_uuid }
			deleted: { equals: $deleted }
		}) {
		id
		name
		description
		image
		published
		created_by
		created_at
		_count {
			modules
			lessons
			members
		}
	}
}