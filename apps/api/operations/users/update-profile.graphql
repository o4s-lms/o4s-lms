mutation ($id: String!, $name: String!, $phone: String!, $locale: String!)
@rbac(requireMatchAny: [user, admin]) {
	user: lms_updateOneUser(
		where: {
			id: $id
			}
			data: {
				name: { set: $name }
				phone: { set: $phone }
				locale: { set: $locale }
				}
	) {
		id
		name
		phone
		locale
	}
}