query ($role: site_CourseRole!) {
	users: site_findManyCourseMember(
		where: { role: { equals: $role } }
	) {
		role
		user {
			id
			uuid
      name
      email
      email_verified,
      picture
      roles
			member_of {
				course_id
				role
				course {
					name
					image
				}
			}
		}
	}
}